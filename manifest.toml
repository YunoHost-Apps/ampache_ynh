packaging_format = 2

id = "ampache"
name = "Ampache"
description.en = "Web based audio/video streaming application"
description.fr = "Application de streaming audio et vidéo"

version = "7.9.2~ynh2"

maintainers = []

[upstream]
license = "AGPL-3.0"
website = "http://ampache.org"
demo = "https://ampache.org/demo.html"
admindoc = "https://github.com/ampache/ampache/wiki"
code = "https://github.com/ampache/ampache"
fund = "https://ampache.org/donate.html"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = true
sso = false

disk = "50M"
ram.build = "500M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/ampache"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

[resources]
        [resources.sources.main]
        url = "https://github.com/ampache/ampache/releases/download/7.9.2/ampache-7.9.2_all_php8.5.zip"
        sha256 = "87a9803f639dcfb24002835de048662e07a6be105a527d5cb34a352f02f0d39f"
        in_subdir = false
        autoupdate.strategy = "latest_github_release"
        autoupdate.asset = "^ampache-.*_all_php8.5.zip$"

    [resources.system_user]
    allow_email = true
    
    [resources.install_dir]
    group = "www-data:r-x"

    [resources.permissions]
    main.url = "/"

    [resources.apt]
    packages = "'libav-tools|ffmpeg', mariadb-server, php8.5-zip, php8.5-mysql, php8.5-curl, php8.5-simplexml, php8.5-gd, php8.5-ldap, php8.5-intl"

    [resources.database]
    type = "mysql"

    [resources.composer]
    version = "2.9.7"
